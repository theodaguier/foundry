name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  desktop-checks:
    name: Desktop Checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Frontend tests
        run: npm test

      - name: Check Tauri backend
        working-directory: src-tauri
        run: cargo check

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test --lib

      - name: Rust clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings
