name: Desktop Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing Git tag to package and upload to its GitHub Release
        required: true
        type: string
      release_notes:
        description: Optional release notes override for latest.json
        required: false
        default: ""
        type: string
      release_published_at:
        description: Optional ISO timestamp override for latest.json pub_date
        required: false
        default: ""
        type: string

concurrency:
  group: desktop-release-${{ github.event_name == 'release' && github.event.release.tag_name || inputs.release_tag }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Apple Silicon
            runner: macos-14
            target: aarch64-apple-darwin
            asset_suffix: darwin_aarch64
          - name: Intel
            runner: macos-15-intel
            target: x86_64-apple-darwin
            asset_suffix: darwin_x86_64
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.release_tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Import Apple certificate
        shell: bash
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
        run: |
          CERT_PATH="$RUNNER_TEMP/foundry-signing.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          echo "APPLE_SIGNING_READY=false" >> "$GITHUB_ENV"

          CERT_PATH="$CERT_PATH" python - <<'PY'
          import base64
          import os
          import pathlib
          import re

          raw = os.environ["APPLE_CERTIFICATE"]
          normalized = re.sub(r"\s+", "", raw).strip("\"'")
          pathlib.Path(os.environ["CERT_PATH"]).write_bytes(base64.b64decode(normalized))
          PY
          if security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" \
            && security default-keychain -s "$KEYCHAIN_PATH" \
            && security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" \
            && security set-keychain-settings -t 3600 -u "$KEYCHAIN_PATH" \
            && security import "$CERT_PATH" \
              -f pkcs12 \
              -k "$KEYCHAIN_PATH" \
              -P "$APPLE_CERTIFICATE_PASSWORD" \
              -A \
              -T /usr/bin/codesign \
            && security set-key-partition-list -S apple-tool:,apple:,codesign: \
              -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"; then
            IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
              | grep -E "Developer ID Application|Apple Distribution" || true)
            IDENTITY=$(printf '%s\n' "$IDENTITY" \
              | head -n 1 \
              | sed -E 's/.*"(.+)".*/\1/')

            if [ -n "$IDENTITY" ]; then
              {
                echo "APPLE_SIGNING_READY=true"
                echo "APPLE_SIGNING_IDENTITY=$IDENTITY"
              } >> "$GITHUB_ENV"

              if [ -n "$APPLE_API_ISSUER" ] && [ -n "$APPLE_API_KEY" ] && [ -n "$APPLE_API_PRIVATE_KEY" ]; then
                API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
                printf '%s' "$APPLE_API_PRIVATE_KEY" > "$API_KEY_PATH"
                {
                  echo "APPLE_API_ISSUER=$APPLE_API_ISSUER"
                  echo "APPLE_API_KEY=$APPLE_API_KEY"
                  echo "APPLE_API_KEY_PATH=$API_KEY_PATH"
                } >> "$GITHUB_ENV"
              else
                echo "Skipping notarization because App Store Connect credentials are incomplete."
              fi
            else
              echo "::warning::No supported macOS signing certificate found. Building unsigned artifacts."
            fi
          else
            echo "::warning::Failed to import macOS signing certificate. Building unsigned artifacts."
          fi

      - name: Build macOS artifacts
        shell: bash
        run: |
          if [ "${APPLE_SIGNING_READY:-false}" != "true" ]; then
            unset APPLE_SIGNING_IDENTITY APPLE_API_ISSUER APPLE_API_KEY APPLE_API_KEY_PATH
          elif [ -z "${APPLE_API_ISSUER:-}" ] || [ -z "${APPLE_API_KEY:-}" ] || [ -z "${APPLE_API_KEY_PATH:-}" ]; then
            unset APPLE_API_ISSUER APPLE_API_KEY APPLE_API_KEY_PATH
          fi

          npm run tauri -- build --target ${{ matrix.target }} --config src-tauri/tauri.macos.conf.json

      - name: Collect macOS artifacts
        shell: bash
        run: |
          RELEASE_TAG="${{ github.event_name == 'release' && github.event.release.tag_name || inputs.release_tag }}"
          VERSION="${RELEASE_TAG#v}"
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          mkdir -p release-assets

          DMG_PATH=$(find "$BUNDLE_DIR/dmg" -maxdepth 1 -type f -name '*.dmg' | head -n 1)
          APP_TAR_PATH=$(find "$BUNDLE_DIR/macos" -maxdepth 1 -type f -name '*.app.tar.gz' | head -n 1)

          if [ -z "$DMG_PATH" ] || [ -z "$APP_TAR_PATH" ]; then
            echo "Missing macOS bundle artifacts in $BUNDLE_DIR" >&2
            exit 1
          fi

          cp "$DMG_PATH" "release-assets/Foundry_${VERSION}_${{ matrix.asset_suffix }}.dmg"
          cp "$APP_TAR_PATH" "release-assets/Foundry_${VERSION}_${{ matrix.asset_suffix }}.app.tar.gz"
          cp "${APP_TAR_PATH}.sig" "release-assets/Foundry_${VERSION}_${{ matrix.asset_suffix }}.app.tar.gz.sig"

      - name: Upload macOS release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.asset_suffix }}
          path: release-assets/*
          if-no-files-found: error

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.release_tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Import Windows certificate and prepare config
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path certificate | Out-Null
          $tempConfig = Join-Path $env:RUNNER_TEMP "tauri.windows.release.conf.json"
          $baseConfig = Get-Content src-tauri/tauri.windows.conf.json -Raw | ConvertFrom-Json
          $normalizedCertificate = ($env:WINDOWS_CERTIFICATE -replace '\s', '').Trim('"', "'")
          $certificateImported = $false

          try {
            [System.IO.File]::WriteAllBytes(
              (Join-Path $PWD "certificate/certificate.pfx"),
              [System.Convert]::FromBase64String($normalizedCertificate)
            )

            $cert = Import-PfxCertificate `
              -FilePath certificate/certificate.pfx `
              -CertStoreLocation Cert:\CurrentUser\My `
              -Password (ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText)

            $thumbprint = $cert.Thumbprint
            if ($thumbprint) {
              $baseConfig.bundle.windows.certificateThumbprint = $thumbprint
              $certificateImported = $true
            }
          } catch {
            Write-Warning "Failed to import Windows signing certificate. Building unsigned artifacts."
          }

          if (-not $certificateImported) {
            $baseConfig.bundle.PSObject.Properties.Remove('windows')
          }

          $configJson = $baseConfig | ConvertTo-Json -Depth 100
          Set-Content -Path $tempConfig -Value $configJson
          "TAURI_WINDOWS_RELEASE_CONFIG=$tempConfig" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build Windows artifacts
        shell: pwsh
        run: npm run tauri -- build --target x86_64-pc-windows-msvc --config $env:TAURI_WINDOWS_RELEASE_CONFIG

      - name: Collect Windows artifacts
        shell: pwsh
        run: |
          $releaseTag = "${{ github.event_name == 'release' && github.event.release.tag_name || inputs.release_tag }}"
          $version = $releaseTag.TrimStart("v")
          $bundleDir = "src-tauri/target/x86_64-pc-windows-msvc/release/bundle"

          $nsis = Get-ChildItem -Path (Join-Path $bundleDir "nsis") -Filter *.exe | Select-Object -First 1
          $msi = Get-ChildItem -Path (Join-Path $bundleDir "msi") -Filter *.msi | Select-Object -First 1

          if (-not $nsis -or -not $msi) {
            throw "Missing Windows installer artifacts in $bundleDir"
          }

          New-Item -ItemType Directory -Force -Path release-assets | Out-Null

          Copy-Item $nsis.FullName "release-assets/Foundry_${version}_windows_x86_64-setup.exe"
          Copy-Item "$($nsis.FullName).sig" "release-assets/Foundry_${version}_windows_x86_64-setup.exe.sig"
          Copy-Item $msi.FullName "release-assets/Foundry_${version}_windows_x86_64.msi"
          Copy-Item "$($msi.FullName).sig" "release-assets/Foundry_${version}_windows_x86_64.msi.sig"

      - name: Upload Windows release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows_x86_64
          path: release-assets/*
          if-no-files-found: error

  publish-assets:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-windows
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.release_tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          merge-multiple: true
          path: release-assets

      - name: Write release notes
        shell: bash
        run: |
          cat <<'EOF' > "$RUNNER_TEMP/release-notes.md"
          ${{ github.event_name == 'release' && github.event.release.body || inputs.release_notes }}
          EOF

      - name: Resolve release metadata
        shell: bash
        run: |
          RELEASE_TAG="${{ github.event_name == 'release' && github.event.release.tag_name || inputs.release_tag }}"
          RELEASE_PUBLISHED_AT="${{ github.event_name == 'release' && github.event.release.published_at || inputs.release_published_at }}"

          if [ -z "$RELEASE_PUBLISHED_AT" ]; then
            RELEASE_PUBLISHED_AT="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          fi

          {
            echo "RELEASE_TAG=$RELEASE_TAG"
            echo "RELEASE_PUBLISHED_AT=$RELEASE_PUBLISHED_AT"
          } >> "$GITHUB_ENV"

      - name: Generate updater manifest
        env:
          RELEASE_NOTES_FILE: ${{ runner.temp }}/release-notes.md
          ASSETS_DIR: release-assets
          OUTPUT_PATH: release-assets/latest.json
        run: node scripts/generate-updater-manifest.mjs

      - name: Upload assets to GitHub Release
        shell: bash
        run: gh release upload "$RELEASE_TAG" release-assets/* --clobber
