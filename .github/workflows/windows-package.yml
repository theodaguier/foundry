name: Build Windows Package

on:
  workflow_dispatch:

jobs:
  package-windows:
    name: Package Windows Installers
    runs-on: windows-latest
    env:
      WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Import Windows certificate and prepare config
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path certificate | Out-Null
          Set-Content -Path certificate/tempCert.txt -Value $env:WINDOWS_CERTIFICATE
          certutil -decode certificate/tempCert.txt certificate/certificate.pfx | Out-Null
          Remove-Item certificate/tempCert.txt

          $cert = Import-PfxCertificate `
            -FilePath certificate/certificate.pfx `
            -CertStoreLocation Cert:\CurrentUser\My `
            -Password (ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText)

          $thumbprint = $cert.Thumbprint
          if (-not $thumbprint) {
            throw "Failed to import Windows signing certificate."
          }

          $config = Get-Content src-tauri/tauri.windows.conf.json -Raw | ConvertFrom-Json
          if ($null -eq $config.bundle.PSObject.Properties['createUpdaterArtifacts']) {
            $config.bundle | Add-Member -NotePropertyName createUpdaterArtifacts -NotePropertyValue $false
          } else {
            $config.bundle.createUpdaterArtifacts = $false
          }
          $config.bundle.windows.certificateThumbprint = $thumbprint
          $tempConfig = Join-Path $env:RUNNER_TEMP "tauri.windows.release.conf.json"
          Set-Content -Path $tempConfig -Value ($config | ConvertTo-Json -Depth 100)
          "TAURI_WINDOWS_RELEASE_CONFIG=$tempConfig" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build Windows installers
        shell: pwsh
        run: npm run tauri -- build --target x86_64-pc-windows-msvc --config $env:TAURI_WINDOWS_RELEASE_CONFIG

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: foundry-windows-installers
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/**
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/**
          if-no-files-found: error
